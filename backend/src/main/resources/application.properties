# Server configuration
server.port=8080

# Database configuration - Kết nối tới PostgreSQL container
spring.datasource.url=jdbc:postgresql://db:5432/rikkei_prod
spring.datasource.username=user_rikkei
spring.datasource.password=password_123
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Application name
spring.application.name=backend-api

# Logging
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
