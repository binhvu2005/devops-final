# Alternative configuration file (YAML format)
# Có thể sử dụng file này thay cho application.properties

server:
  port: 8080

spring:
  application:
    name: backend-api
  datasource:
    url: jdbc:postgresql://postgres:5432/rikkei_prod
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

logging:
  level:
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG
