version: '3.8'

# File này dùng trên server production với images từ Docker Hub
# Thay YOUR_DOCKERHUB_USERNAME bằng username Docker Hub của bạn

services:
  # PostgreSQL Database
  db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_DB: rikkei_prod
      POSTGRES_USER: user_rikkei
      POSTGRES_PASSWORD: password_123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - rikkei_network

  # Backend Service (Spring Boot)
  backend:
    image: YOUR_DOCKERHUB_USERNAME/backend-009:latest
    container_name: spring_backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/rikkei_prod
      SPRING_DATASOURCE_USERNAME: user_rikkei
      SPRING_DATASOURCE_PASSWORD: password_123
    depends_on:
      - db
    networks:
      - rikkei_network
    ports:
      - "8080:8080"

  # Frontend Service (ReactJS)
  frontend:
    image: YOUR_DOCKERHUB_USERNAME/frontend-009:latest
    container_name: react_frontend
    networks:
      - rikkei_network
    ports:
      - "80:80"

volumes:
  postgres_data:
    driver: local

networks:
  rikkei_network:
    driver: bridge
