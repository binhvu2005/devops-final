name: Deploy Fullstack App

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and Push Images
        run: |
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/frontend-009:latest ./frontend
          docker build -t ${{ secrets.DOCKER_HUB_USERNAME }}/backend-009:latest ./backend
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/frontend-009:latest
          docker push ${{ secrets.DOCKER_HUB_USERNAME }}/backend-009:latest

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: 3.27.8.77
          username: ubuntu
          key: ${{ secrets.SERVER_KEY }}
          script: |
            mkdir -p ~/HN_KS25_VuThanhBinh_009
            cd ~/HN_KS25_VuThanhBinh_009
            docker-compose -f docker-compose.prod.yml pull
            docker-compose -f docker-compose.prod.yml up -d
            docker image prune -f
